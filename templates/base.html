<!DOCTYPE html>
<html>
<head>
    <title>Sistema</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- 🔝 MENU SUPERIOR -->
    <div class="menu">
        <div>
            <a href="/dashboard" >Dashboard</a>
        <a href="/pacientes">Inserir Paciente</a>
        <a href="/atendimentos">Inserir Atendimentos</a>
        </div>
        <div>
            <a href="/logout">Sair</a>
        </div>
    </div>

    <div style="padding:20px;">
        {% block conteudo %}{% endblock %}
    </div>
<!-- Modal -->
<div id="modalPaciente" class="modal">
  <div class="modal-content">
    
    <h2>Dados do Paciente</h2>
    <div id="conteudoPaciente">
        <label>Nome:</label>
        <input type="text" id="nome" readonly>

        <label>CPF:</label>
        <input type="text" id="cpf" readonly>

        <label>Data de Nascimento:</label>
        <input type="date" id="nascimento" readonly>

        <label>Telefone:</label>
        <input type="text" id="telefone" readonly>
    </div>   
    <br><br>

    <!-- Botões -->
    <button id="btnEditar" onclick="habilitarEdicao()">✏️ Editar</button>

    <button id="btnSalvar" onclick="salvarEdicao()" style="display:none;">
      💾 Salvar
    </button>

    <button onclick="fecharModal()">Fechar</button>

  </div>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
